name: "Reflexive TSP Transport (20-city perturbed)"
description: "Non-circular 20-city layout with coordinate perturbations to stress-test DSAC subtour suppression."
scenario_type: tsp_reflexive
lattice: [64, 64]
timestep: 0.02
max_steps: 15000
initial_condition_refs:
  - name: tsp_uniform_warm_start
    type: tsp_warm_start
    parameters:
      num_cities: 20
      embedding_row_start: 2
      embedding_col_start: 2
      noise_level: 0.08

constraints:
  - name: psi_imag_sync
    expression: chi - psi_imag
    variables: [psi_imag]
    target: psi_imag
    dependencies: [chi]
    weight: 0.05

  - name: chi_decay
    expression: chi * 0.02
    variables: [chi]
    target: chi
    dependencies: []
    weight: 0.08

  - name: chi_dot_decay
    expression: 0.0
    variables: [chi_dot]
    target: chi_dot
    dependencies: []
    weight: 0.08

halting_criteria:
  success_condition: tour_verified
  max_steps: 15000
  dissonance_plateau_steps: 400
  dissonance_plateau_tolerance: 0.0015

success_metrics:
  tour_verified:
    min: 1.0
  doubly_stochastic_error:
    max: 0.02
  tour_cost_gap:
    max: 0.05

