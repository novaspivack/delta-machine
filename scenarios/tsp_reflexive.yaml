# Placeholder scenario file for Reflexive TSP Transport experiment.
# Detailed specification to follow milestones in notes/1.5_dsac_scenario_roadmap.md (Section 5).
name: Reflexive TSP Transport (M1)
scenario_type: tsp_reflexive
lattice: [64, 64]
timestep: 0.02
max_steps: 6000

halting_criteria:
  success_condition: tour_verified
  max_steps: 6000
  dissonance_plateau_steps: 120
  dissonance_plateau_tolerance: 0.001

success_metrics:
  doubly_stochastic_error:
    max: 0.02
  tour_verified:
    min: 1.0
  tour_cost_gap:
    max: 0.05

initial_condition_refs:
  - name: tsp_uniform_warm_start
    type: tsp_warm_start
    parameters:
      num_cities: 8
      embedding_row_start: 4
      embedding_col_start: 4
      noise_level: 0.05

constraints:
  - name: psi_imag_sync
    expression: psi_real
    variables: [psi_real]
    target: psi_imag
    dependencies: []
    weight: 0.25

  - name: chi_decay
    expression: 0.0
    variables: [chi]
    target: chi
    dependencies: []
    weight: 0.1

  - name: chi_dot_decay
    expression: 0.0
    variables: [chi_dot]
    target: chi_dot
    dependencies: []
    weight: 0.1

metadata:
  description: "Reflexive TSP stage focused on Sinkhorn normalisation (M1)."
  max_workers: 9
  lattice_usage_margin: 4
  meta_control:
    reaction_decay: 0.93
    temperature_gain: 0.05
    drive_gain: 0.35
    beta_gain: 6.5
    sinkhorn_extra_max: 10
    perturbation_threshold: 6.0e-4
    perturbation_cooldown: 140
    perturbation_strength: 0.03
    temperature_leak: 0.02
  tsp:
    num_cities: 8
    row_start: 4
    col_start: 4
    beta: 6.0
    epsilon: 1.0e-6
    sinkhorn_iterations: 10
    stochasticity_tolerance: 0.02
    assignment_threshold: 0.55
    cost_gap_target: 0.05
    city_positions:
      - [0.05, 0.05]
      - [0.30, 0.08]
      - [0.55, 0.05]
      - [0.80, 0.12]
      - [0.92, 0.55]
      - [0.78, 0.90]
      - [0.40, 0.95]
      - [0.12, 0.60]
    optimal_tour: [7, 0, 1, 2, 3, 4, 5, 6]
    optimal_cost: 2.9725247599861198
  expected_behavior: "Reflexive Sinkhorn dynamics plus subtour suppression converge to a Hamiltonian tour with cost within 5% of the optimal reference."
